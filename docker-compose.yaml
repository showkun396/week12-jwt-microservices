services:
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - loki

  # ตัวอย่าง Service ของคุณ (ให้เช็คชื่อโฟลเดอร์/ไฟล์ของคุณอีกที)
  auth-service:
    build: ./auth-service
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"

  # เพิ่ม service อื่นๆ (user-service, task-service) ตามที่คุณสร้างไว้